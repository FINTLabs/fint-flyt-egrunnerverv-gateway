apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agderfk-no

resources:
  - ../../../base

labels:
  - pairs:
      app.kubernetes.io/instance: fint-flyt-egrunnerverv-gateway_agderfk_no
      fintlabs.no/org-id: agderfk.no

patches:
  - patch: |-
      - op: replace
        path: "/spec/kafka/acls/0/topic"
        value: "agderfk-no.flyt.*"
      - op: replace
        path: "/spec/orgId"
        value: "agderfk.no"
      - op: replace
        path: "/spec/ingress/basePath"
        value: "/api/egrunnerverv/instances/921707134"
      - op: add
        path: "/spec/env/-"
        value:
          name: novari.kafka.topic.org-id
          value: "agderfk-no"
      - op: add
        path: "/spec/env/-"
        value:
          name: novari.flyt.egrunnerverv.checkSaksansvarligEpost
          value: "false"
      - op: add
        path: "/spec/env/-"
        value:
          name: novari.flyt.egrunnerverv.checkSaksbehandler
          value: "false"
      - op: add
        path: "/spec/env/-"
        value:
          name: novari.flyt.egrunnerverv.dispatch.base-url
          value: "https://vigoiks.service-now.com/api/now/table"
      - op: add
        path: "/spec/env/-"
        value:
          name: novari.flyt.egrunnerverv.dispatch.token-uri
          value: "https://vigoiks.service-now.com/oauth_token.do"
      # ServiceNow returnerer 401 hvis client_secret URL-encodes i
      # Authorization: Basic-headeren (slik RFC 6749 §2.3.1 krever, og
      # som Spring Security gjør by default). Verifisert mot
      # vigoikstest.service-now.com 2026-05-29: client_secret med
      # spesialtegn feiler i Basic-flow, men client_secret_post med
      # credentials i body fungerer. Overstyrer derfor metoden her i
      # stedet for å regenerere secret-et eller patche Spring.
      - op: add
        path: "/spec/env/-"
        value:
          name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_EGRUNNERVERV_CLIENT_AUTHENTICATION_METHOD
          value: "client_secret_post"
      - op: replace
        path: "/spec/probes/startup/path"
        value: "/actuator/health"
      - op: replace
        path: "/spec/probes/readiness/path"
        value: "/actuator/health/readiness"
      - op: replace
        path: "/spec/probes/liveness/path"
        value: "/actuator/health/liveness"
      - op: replace
        path: "/spec/observability/metrics/path"
        value: "/actuator/prometheus"
    target:
      kind: Application
      name: fint-flyt-egrunnerverv-gateway
